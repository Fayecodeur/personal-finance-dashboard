<div class="categories-container">
    <div class="header">
        <h2>Catégories</h2>
        <button mat-raised-button color="primary" (click)="openForm()">Ajouter</button>
    </div>

    <table mat-table [dataSource]="categories()">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nom</th>
            <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let c">{{ c.type === 'revenu' ? 'Revenu' : 'Dépense' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let c">
                <button mat-icon-button (click)="openForm(c)"><mat-icon>edit</mat-icon></button>
                <button mat-icon-button (click)="deleteCategory(c._id)"><mat-icon>delete</mat-icon></button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
