<div class="categories-container">
    <div class="header">
        <h2>Catégories</h2>
        <button mat-raised-button color="primary" (click)="openForm()">Ajouter</button>
    </div>

    <mat-form-field appearance="outline" class="search-field">
        <mat-label>Rechercher</mat-label>
        <input matInput (input)="onSearchChange($any($event.target).value)" placeholder="Nom de la catégorie..." />
    </mat-form-field>

    <table mat-table [dataSource]="paged()">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nom</th>
            <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let c">{{ c.type === 'revenu' ? 'Revenu' : 'Dépense' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let c">
                <button mat-icon-button class="icon-edit" (click)="openForm(c)"><mat-icon>edit</mat-icon></button>
                <button mat-icon-button class="icon-delete"
                    (click)="deleteCategory(c._id)"><mat-icon>delete</mat-icon></button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="filtered().length" [pageSize]="pageSize()" [pageSizeOptions]="[5, 10, 25]"
        (page)="onPageChange($event)">
    </mat-paginator>
</div>
