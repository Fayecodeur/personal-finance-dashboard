<h2 class="form-title">
    {{ isEdit ? 'Modifier' : 'Ajouter' }} une transaction
</h2>


<form [formGroup]="form" (ngSubmit)="onSubmit()" class="transaction-form">

    <mat-dialog-content>


        <div class="form-group">

            <label for="type">Type</label>

            <select id="type" formControlName="type">

                <option value="depense">
                    Dépense
                </option>

                <option value="revenu">
                    Revenu
                </option>

            </select>

        </div>



        <div class="form-group">

            <label for="amount">Montant</label>

            <input id="amount" type="number" placeholder="Ex: 5000 FCFA" formControlName="amount" />

        </div>



        <div class="form-group">

            <label for="description">Description</label>

            <input id="description" type="text" placeholder="Ex: Achat alimentaire" formControlName="description" />

        </div>



        <div class="form-group">

            <label for="category">Catégorie</label>

            <select id="category" formControlName="category">

                <option value="" disabled>
                    Choisir une catégorie
                </option>


                @for (cat of data.categories; track cat._id) {

                <option [value]="cat._id">
                    {{ cat.name }}
                </option>

                }

            </select>

        </div>



        <div class="form-group">

            <label>Date</label>


            <div class="date-input">


                <input matInput [matDatepicker]="picker" formControlName="date" readonly />


                <button type="button" mat-icon-button (click)="picker.open()" aria-label="Choisir une date">

                    <mat-icon>
                        calendar_today
                    </mat-icon>

                </button>


                <mat-datepicker #picker></mat-datepicker>


            </div>


        </div>


    </mat-dialog-content>



    <mat-dialog-actions>


        <button type="button" class="cancel-btn" (click)="onCancel()">
            Annuler
        </button>



        <button type="submit" class="submit-btn">
            {{ isEdit ? 'Modifier' : 'Ajouter' }}
        </button>


    </mat-dialog-actions>


</form>
