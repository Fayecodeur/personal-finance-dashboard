<div class="transactions-container">
    <div class="header">
        <h2>Transactions</h2>
        <button mat-raised-button color="primary" (click)="openForm()">Ajouter</button>
    </div>

    <mat-form-field appearance="outline" class="search-field">
        <mat-label>Rechercher</mat-label>
        <input matInput (input)="onSearchChange($any($event.target).value)" placeholder="Description..." />
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)">
        <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
            <td mat-cell *matCellDef="let t">{{ t.date | date: 'dd/MM/yyyy' }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Description</th>
            <td mat-cell *matCellDef="let t">{{ t.description }}</td>
        </ng-container>

        <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef>Catégorie</th>
            <td mat-cell *matCellDef="let t">{{ getCategoryName(t.category) }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let t">

                <span class="badge" [class.badge-income]="t.type === 'revenu'"
                    [class.badge-expense]="t.type === 'depense'">

                    {{ t.type === 'revenu' ? 'Revenu' : 'Dépense' }}

                </span>

            </td>
        </ng-container>

        <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Montant</th>
            <td mat-cell *matCellDef="let t" class="amount" [class.income]="t.type === 'revenu'"
                [class.expense]="t.type === 'depense'">
                {{ t.amount | number: '1.0-2' }} FCFA
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let t">
                <button mat-icon-button class="icon-edit" (click)="openForm(t)"><mat-icon>edit</mat-icon></button>
                <button mat-icon-button class="icon-delete"
                    (click)="deleteTransaction(t._id)"><mat-icon>delete</mat-icon></button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25]"
        (page)="onPageChange($event)">
    </mat-paginator>
</div>
