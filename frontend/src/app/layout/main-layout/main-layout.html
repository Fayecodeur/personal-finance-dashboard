<app-header (menuClick)="toggleSidenav()" [showMenuButton]="isMobile()"></app-header>

<mat-sidenav-container class="sidenav-container">
    <mat-sidenav [mode]="isMobile() ? 'over' : 'side'" [opened]="sidenavOpened()"
        (closedStart)="isMobile() && sidenavOpened.set(false)" class="sidenav">
        <app-sidebar></app-sidebar>
    </mat-sidenav>

    <mat-sidenav-content class="content">
        <router-outlet></router-outlet>
    </mat-sidenav-content>
</mat-sidenav-container>
